<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nature Sounds Player</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: #7ee8a2;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 0.82rem;
    color: #6e7681;
    margin-bottom: 36px;
  }

  /* Now playing bar */
  .player-bar {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 14px;
    padding: 20px 24px;
    width: 100%;
    max-width: 620px;
    margin-bottom: 28px;
  }

  .now-playing-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #6e7681;
    margin-bottom: 6px;
  }

  .now-playing-title {
    font-size: 1.05rem;
    color: #e6edf3;
    margin-bottom: 14px;
    min-height: 1.4em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  audio {
    width: 100%;
    height: 36px;
    accent-color: #7ee8a2;
    outline: none;
  }

  audio::-webkit-media-controls-panel {
    background: #21262d;
  }

  /* Playlist */
  .playlist {
    width: 100%;
    max-width: 620px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .track {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 10px;
    padding: 12px 16px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }

  .track:hover {
    background: #1c2128;
    border-color: #388bfd44;
  }

  .track.active {
    background: #0d2234;
    border-color: #7ee8a2;
  }

  .track-num {
    font-size: 0.75rem;
    color: #6e7681;
    width: 20px;
    text-align: right;
    flex-shrink: 0;
  }

  .track.active .track-num {
    color: #7ee8a2;
  }

  .track-icon {
    font-size: 1.1rem;
    flex-shrink: 0;
    width: 22px;
    text-align: center;
  }

  .track-name {
    flex: 1;
    font-size: 0.9rem;
    color: #c9d1d9;
  }

  .track.active .track-name {
    color: #e6edf3;
    font-weight: 500;
  }

  .play-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid #30363d;
    background: transparent;
    color: #7ee8a2;
    font-size: 0.75rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .play-btn:hover {
    background: #7ee8a233;
  }

  .track.active .play-btn {
    background: #7ee8a233;
    border-color: #7ee8a2;
  }

  .footer {
    margin-top: 40px;
    font-size: 0.75rem;
    color: #3d444d;
  }
</style>
</head>
<body>

<h1>🌿 Nature Sounds</h1>
<p class="subtitle">点击曲目即可播放 · Click a track to play</p>

<div class="player-bar">
  <div class="now-playing-label">Now Playing</div>
  <div class="now-playing-title" id="nowTitle">— 请选择一首 —</div>
  <audio id="player" controls preload="none"></audio>
</div>

<div class="playlist" id="playlist"></div>

<div class="footer">Powered by Internet Archive · Public Domain Audio</div>

<script>
const tracks = [
  { name: "Gentle Ocean",        icon: "🌊", url: "Gentle_Ocean.mp3" },
  { name: "Light Gentle Rain",   icon: "🌧️", url: "Light_Gentle_Rain.mp3" },
  { name: "Thunderstorm",        icon: "⛈️", url: "Thunderstorm.mp3" },
  { name: "Birdsong",            icon: "🐦", url: "Birdsong.mp3" },
  { name: "Stream & Birds",      icon: "💧", url: "Stream_Birds.mp3" },
  { name: "Sea Storm",           icon: "🌀", url: "Sea_Storm.mp3" },
  { name: "Sleep Aboard Sailboat", icon: "⛵", url: "Sailboat.mp3" },
  { name: "Tropical Rain",       icon: "🌴", url: "Tropical_Rain.mp3" },
  { name: "Rainforest",          icon: "🌿", url: "Rainforest.mp3" },
  { name: "Forest Soundscape",   icon: "🍃", url: "Forest_Soundscape.mp3" },
  { name: "Birds in the Rain",   icon: "🌦️", url: "Birds_Rain.mp3" },
];

const player = document.getElementById('player');
const nowTitle = document.getElementById('nowTitle');
const playlist = document.getElementById('playlist');
let currentIndex = -1;

function play(index) {
  currentIndex = index;
  const t = tracks[index];
  player.src = t.url;
  player.play();
  nowTitle.textContent = t.icon + '  ' + t.name;
  document.querySelectorAll('.track').forEach((el, i) => {
    el.classList.toggle('active', i === index);
    el.querySelector('.play-btn').textContent = i === index ? '⏸' : '▶';
  });
}

player.addEventListener('ended', () => {
  if (currentIndex < tracks.length - 1) play(currentIndex + 1);
});

player.addEventListener('pause', () => {
  const btn = document.querySelectorAll('.play-btn')[currentIndex];
  if (btn) btn.textContent = '▶';
});

player.addEventListener('play', () => {
  const btn = document.querySelectorAll('.play-btn')[currentIndex];
  if (btn) btn.textContent = '⏸';
});

tracks.forEach((t, i) => {
  const div = document.createElement('div');
  div.className = 'track';
  div.innerHTML = `
    <span class="track-num">${i + 1}</span>
    <span class="track-icon">${t.icon}</span>
    <span class="track-name">${t.name}</span>
    <button class="play-btn" title="播放">▶</button>
  `;
  div.addEventListener('click', () => {
    if (currentIndex === i && !player.paused) {
      player.pause();
    } else {
      play(i);
    }
  });
  playlist.appendChild(div);
});
</script>
</body>
</html>
